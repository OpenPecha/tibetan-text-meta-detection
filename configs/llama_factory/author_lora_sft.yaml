### model
model_name_or_path: YoLo2000/TiLamb-7B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all

### dataset
dataset: tibetan_author_sft
eval_dataset: tibetan_author_sft_val
template: llama2
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: saves/tibetan-author-lora
logging_steps: 25
save_steps: 1000
eval_steps: 1000
eval_strategy: steps
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
